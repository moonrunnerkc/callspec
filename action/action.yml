name: 'LLMAssert LLM Assertion Testing'
description: 'Run LLMAssert behavioral assertions against your LLM application in CI. Annotates PRs with failure details.'
author: 'Aftermath Technologies Ltd.'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  command:
    description: 'LLMAssert command to run. Default runs a YAML suite file.'
    required: false
    default: 'run'
  suite:
    description: 'Path to the YAML assertion suite file.'
    required: false
    default: ''
  report-format:
    description: 'Report format: json, junit, or plaintext.'
    required: false
    default: 'json'
  report-path:
    description: 'Output path for the report file.'
    required: false
    default: 'llm-assert-report.json'
  python-version:
    description: 'Python version to use. Defaults to 3.12.'
    required: false
    default: '3.12'
  llm-assert-extras:
    description: 'LLMAssert extras to install (e.g. "openai,semantic").'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for running LLMAssert.'
    required: false
    default: '.'
  strict:
    description: 'Enable strict mode (borderline passes become failures).'
    required: false
    default: 'false'

outputs:
  passed:
    description: 'Whether all assertions passed (true/false).'
    value: ${{ steps.llm-assert-run.outputs.llm_assert_passed }}
  passed-cases:
    description: 'Number of passing cases.'
    value: ${{ steps.llm-assert-run.outputs.llm_assert_passed_cases }}
  failed-cases:
    description: 'Number of failing cases.'
    value: ${{ steps.llm-assert-run.outputs.llm_assert_failed_cases }}
  total-cases:
    description: 'Total number of cases.'
    value: ${{ steps.llm-assert-run.outputs.llm_assert_total_cases }}
  report-path:
    description: 'Path to the generated report file.'
    value: ${{ inputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install LLMAssert
      shell: bash
      run: |
        if [ -n "${{ inputs.llm-assert-extras }}" ]; then
          pip install "llm-assert[${{ inputs.llm-assert-extras }}]"
        else
          pip install llm-assert
        fi

    - name: Install project dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        elif [ -f pyproject.toml ]; then
          pip install .
        fi

    - name: Run LLMAssert
      id: llm-assert-run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set +e
        if [ "${{ inputs.command }}" = "run" ] && [ -n "${{ inputs.suite }}" ]; then
          llm-assert run "${{ inputs.suite }}" \
            --report-format "${{ inputs.report-format }}" \
            --report-path "${{ inputs.report-path }}" \
            --github-annotations
          EXIT_CODE=$?
        elif [ "${{ inputs.command }}" = "pytest" ]; then
          pytest --llm-assert-report "${{ inputs.report-format }}" \
            --llm-assert-report-path "${{ inputs.report-path }}"
          EXIT_CODE=$?
        else
          llm-assert ${{ inputs.command }}
          EXIT_CODE=$?
        fi

        if [ $EXIT_CODE -ne 0 ]; then
          echo "llm_assert_passed=false" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
        else
          echo "llm_assert_passed=true" >> "$GITHUB_OUTPUT"
        fi
