name: 'Callspec Tool-Call Contract Testing'
description: 'Run tool-call contract assertions against your LLM agent in CI. Annotates PRs with contract failure details.'
author: 'Aftermath Technologies Ltd.'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  command:
    description: 'Callspec command to run. Default runs a YAML suite file.'
    required: false
    default: 'run'
  suite:
    description: 'Path to the YAML contract suite file.'
    required: false
    default: ''
  provider:
    description: 'LLM provider name (openai, anthropic, google, etc.). Overrides suite-level provider.'
    required: false
    default: ''
  report-format:
    description: 'Report format: json, junit, or plaintext.'
    required: false
    default: 'json'
  report-path:
    description: 'Output path for the report file.'
    required: false
    default: 'callspec-report.json'
  python-version:
    description: 'Python version to use. Defaults to 3.12.'
    required: false
    default: '3.12'
  callspec-extras:
    description: 'Callspec extras to install (e.g. "openai").'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for running Callspec.'
    required: false
    default: '.'
  strict:
    description: 'Enable strict mode (borderline passes become failures).'
    required: false
    default: 'false'

outputs:
  passed:
    description: 'Whether all assertions passed (true/false).'
    value: ${{ steps.callspec-run.outputs.callspec_passed }}
  passed-cases:
    description: 'Number of passing cases.'
    value: ${{ steps.callspec-run.outputs.callspec_passed_cases }}
  failed-cases:
    description: 'Number of failing cases.'
    value: ${{ steps.callspec-run.outputs.callspec_failed_cases }}
  total-cases:
    description: 'Total number of cases.'
    value: ${{ steps.callspec-run.outputs.callspec_total_cases }}
  report-path:
    description: 'Path to the generated report file.'
    value: ${{ inputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Callspec
      shell: bash
      run: |
        if [ -n "${{ inputs.callspec-extras }}" ]; then
          pip install "callspec[${{ inputs.callspec-extras }}]"
        else
          pip install callspec
        fi

    - name: Install project dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        elif [ -f pyproject.toml ]; then
          pip install .
        fi

    - name: Run Callspec
      id: callspec-run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CALLSPEC_PROVIDER: ${{ inputs.provider }}
      run: |
        set +e

        PROVIDER_FLAG=""
        if [ -n "${{ inputs.provider }}" ]; then
          PROVIDER_FLAG="--provider ${{ inputs.provider }}"
        fi

        STRICT_FLAG=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          STRICT_FLAG="--strict"
        fi

        if [ "${{ inputs.command }}" = "run" ] && [ -n "${{ inputs.suite }}" ]; then
          callspec run "${{ inputs.suite }}" \
            --format "${{ inputs.report-format }}" \
            --output "${{ inputs.report-path }}" \
            $PROVIDER_FLAG \
            $STRICT_FLAG \
            --github-annotations
          EXIT_CODE=$?
        elif [ "${{ inputs.command }}" = "pytest" ]; then
          pytest --callspec-report "${{ inputs.report-format }}" \
            --callspec-report-path "${{ inputs.report-path }}"
          EXIT_CODE=$?
        else
          callspec ${{ inputs.command }}
          EXIT_CODE=$?
        fi

        if [ $EXIT_CODE -ne 0 ]; then
          echo "callspec_passed=false" >> "$GITHUB_OUTPUT"
        else
          echo "callspec_passed=true" >> "$GITHUB_OUTPUT"
        fi

        # Extract case counts from the JSON report when available
        REPORT_FILE="${{ inputs.report-path }}"
        if [ -f "$REPORT_FILE" ] && [ "${{ inputs.report-format }}" = "json" ]; then
          PASSED_CASES=$(python3 -c "import json; r=json.load(open('$REPORT_FILE')); print(r.get('suite',{}).get('passed_cases',0))" 2>/dev/null || echo "0")
          FAILED_CASES=$(python3 -c "import json; r=json.load(open('$REPORT_FILE')); print(r.get('suite',{}).get('failed_cases',0))" 2>/dev/null || echo "0")
          TOTAL_CASES=$(python3 -c "import json; r=json.load(open('$REPORT_FILE')); print(r.get('suite',{}).get('total_cases',0))" 2>/dev/null || echo "0")
        else
          PASSED_CASES="0"
          FAILED_CASES="0"
          TOTAL_CASES="0"
        fi

        echo "callspec_passed_cases=$PASSED_CASES" >> "$GITHUB_OUTPUT"
        echo "callspec_failed_cases=$FAILED_CASES" >> "$GITHUB_OUTPUT"
        echo "callspec_total_cases=$TOTAL_CASES" >> "$GITHUB_OUTPUT"

        if [ $EXIT_CODE -ne 0 ]; then
          exit $EXIT_CODE
        fi
